<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ShiftLink</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .time-cell { min-width: 44px; }
    html { scroll-behavior: smooth; }
    .timeline-scroll { overflow: auto; max-height: 520px; scroll-behavior: smooth; overscroll-behavior: contain; }
    .timeline-sticky-head { position: sticky; top: 0; z-index: 20; background: #fff7ed; box-shadow: 0 1px 0 rgba(15,23,42,.08); }
    .timeline-sticky-name { position: sticky; left: 0; z-index: 10; background: #fff; box-shadow: 1px 0 0 rgba(15,23,42,.08); }
    .timeline-sticky-corner { position: sticky; left: 0; z-index: 30; background: #fff7ed; box-shadow: 1px 1px 0 rgba(15,23,42,.08); }
    .timeline-warning:focus { outline: 2px solid #f97316; outline-offset: 2px; }
    .demo-modal input, .demo-modal select, .demo-modal textarea { width: 100%; min-height: 48px; font-size: 14px; padding: 12px 14px; }
    .demo-modal textarea { min-height: 88px; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen select-none">
<div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative transition-all duration-300">
  <header id="app-header" class="hidden bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
    <div class="flex items-center gap-2"><i class="fa-solid fa-graduation-cap text-blue-400"></i><span class="font-bold text-sm">ShiftLink</span></div>
    <div class="flex items-center gap-3"><span id="user-badge" class="text-xs bg-blue-600/80 px-2.5 py-1 rounded-full font-bold"></span><button onclick="logout()" class="text-slate-400 hover:text-white text-xs font-bold"><i class="fa-solid fa-right-from-bracket"></i></button></div>
  </header>

  <section id="auth" class="flex-1 flex flex-col justify-center items-center p-6 bg-slate-50">
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <div class="text-center mb-6"><div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2"><i class="fa-solid fa-link text-blue-600"></i></div><h1 class="text-base font-bold text-slate-900">ShiftLink</h1><p class="text-[11px] text-slate-500 mt-0.5">教室運営システム</p></div>
      <div id="login-form" class="space-y-4">
        <div><label class="block text-[11px] font-bold text-slate-500 mb-1">ログインID</label><input id="login-id" placeholder="T000" class="w-full p-3 border border-slate-300 rounded-xl text-sm font-bold focus:outline-none focus:border-blue-500"></div>
        <div><label class="block text-[11px] font-bold text-slate-500 mb-1">パスワード</label><div class="relative"><input id="login-password" type="password" placeholder="英数字8文字以上" class="w-full p-3 pr-16 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-blue-500"><button type="button" onclick="togglePassword('login-password',this)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold">👁表示</button></div></div>
        <button onclick="login()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm shadow-sm active:scale-[.98]">ログイン</button>
      </div>
    </div>
  </section>

  <main id="main" class="hidden flex-1 p-4 overflow-y-auto bg-slate-50 custom-scrollbar pb-20"></main>
  <nav id="teacher-nav" class="hidden absolute bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-200 flex justify-around items-center z-40 shadow-[0_-2px_10px_rgba(0,0,0,.02)]"></nav>
</div>

<script>
const timeOptions = ["13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00","20:30","21:00","21:30","22:00"];
const SHIFT = { SUBMITTED:"提出", ADJUSTING:"調整中", CONFIRMED:"確定", PUBLISHED:"公開済み" };
const DEMO = { OPEN:"募集中", APPLIED:"応募あり", ASSIGNED:"担当決定", WAITING:"確認待ち", CONFIRMED:"確認済み", DONE:"完了", CANCELED:"キャンセル" };
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbytIB3xjpWgVnkT2G1y6r2gEi7v8k8BUItom5_VuubrOPiPAQlOA0bD6KeKcGBpz0NulA/exec";
const store = {
  read(key, fallback){ try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } },
  write(key, value){ localStorage.setItem(key, JSON.stringify(value)); return value; }
};

function defaultTeachers(){return [
  {teacherId:"T000", name:"教室長", loginId:"T000", password:"Manager123", role:"admin", status:"在籍", memo:"", mustChangePassword:false}
]}
 
const SPREADSHEET_API_URL = GAS_WEB_APP_URL;

const sheetSync = {
  async importFromSpreadsheet() {
    const url = gasUrl();
    if (!url) return;

    const response = await fetch(url);
    const data = await response.json();

    if (Array.isArray(data.teachers) && data.teachers.length) repo.saveTeachers(data.teachers);
    if (Array.isArray(data.shiftRequests)) repo.saveShiftRequests(data.shiftRequests.map(normalizeShiftRequest));
    if (Array.isArray(data.staffShifts)) repo.saveStaffShifts(data.staffShifts.map(normalizeStaffShift));
    if (Array.isArray(data.demoLessons)) repo.saveDemoLessons(data.demoLessons.map(normalizeDemoLesson));
    if (Array.isArray(data.demoApplications)) repo.saveDemoApplications(data.demoApplications);
    if (Array.isArray(data.managerAbsences)) repo.saveManagerAbsences(data.managerAbsences.map(normalizeManagerAbsence));
    if (Array.isArray(data.notifications)) repo.saveNotifications(data.notifications);
    if (Array.isArray(data.settings) && data.settings[0]) repo.saveSettings(data.settings[0]);

    teachers = repo.loadTeachers();
    shiftRequests = repo.loadShiftRequests();
    staffShifts = repo.loadStaffShifts();
    demoLessons = repo.loadDemoLessons();
    demoApplications = repo.loadDemoApplications();
    managerAbsences = repo.loadManagerAbsences();
    notifications = repo.loadNotifications();
    settings = repo.loadSettings();
    ensureDefaultAdmin();
    applyCommonTeacherPassword();
  },

  async exportToSpreadsheet() {
    const url = gasUrl();
    if (!url) return;

    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify({
        teachers: repo.loadTeachers(),
        shiftRequests: repo.loadShiftRequests(),
        staffShifts: repo.loadStaffShifts(),
        demoLessons: repo.loadDemoLessons(),
        demoApplications: repo.loadDemoApplications(),
        managerAbsences: repo.loadManagerAbsences(),
        notifications: repo.loadNotifications(),
        settings: [repo.loadSettings()]
      })
    });
  }
};
const repo = {
  loadTeachers(){return store.read("sl_teachers_v4", defaultTeachers())}, saveTeachers(data){return store.write("sl_teachers_v4",data)},
  loadShiftRequests(){return store.read("sl_shift_requests_v3",[])}, saveShiftRequests(data){return store.write("sl_shift_requests_v3",data)},
  loadStaffShifts(){return store.read("sl_staff_shifts_v2",[])}, saveStaffShifts(data){return store.write("sl_staff_shifts_v2",data)},
  loadDemoLessons(){return store.read("sl_demo_lessons_v2",[])}, saveDemoLessons(data){return store.write("sl_demo_lessons_v2",data)},
  loadDemoApplications(){return store.read("sl_demo_applications_v2",[])}, saveDemoApplications(data){return store.write("sl_demo_applications_v2",data)},
  loadManagerAbsences(){return store.read("sl_manager_absences_v1",[])}, saveManagerAbsences(data){return store.write("sl_manager_absences_v1",data)},
  loadNotifications(){return store.read("sl_notifications_v2",[])}, saveNotifications(data){return store.write("sl_notifications_v2",data)},
  loadSettings(){return store.read("sl_settings_v2",{shiftDeadline:"",future:{}})}, saveSettings(data){return store.write("sl_settings_v2",data)}
};

let teachers = repo.loadTeachers();
let shiftRequests = repo.loadShiftRequests();
let staffShifts = repo.loadStaffShifts();
let demoLessons = repo.loadDemoLessons();
let demoApplications = repo.loadDemoApplications();
let managerAbsences = repo.loadManagerAbsences();
let notifications = repo.loadNotifications();
let settings = repo.loadSettings();
let currentUser = null;
let managerView = "home";
let teacherView = "home";
let selectedRequestIds = new Set();
let calYear = 2026, calMonth = 7, selectedDates = [];
let managerDemoMode = "list", demoCalYear = 2026, demoCalMonth = 7, demoFilter = "all", selectedDemoDate = "2026-07-20";
let managerShiftMode = "timeline", shiftCalYear = 2026, shiftCalMonth = 7;
let teacherSearchQuery = "";
let teacherPlansMode = "active";
let showDemoModal = false;
let teacherNoticeOpen = false;
let pendingLoginToast = false;
let copyFeedbackKey = "";
const DEFAULT_TEACHER_PASSWORD = "Teacher123";
function ensureDefaultAdmin(){const admin=defaultTeachers()[0];const i=teachers.findIndex(t=>t.teacherId==="T000"||t.loginId==="T000"||t.role==="admin");if(i>=0){teachers[i]={...teachers[i],...admin}}else{teachers.unshift(admin)}repo.saveTeachers(teachers)}
function applyCommonTeacherPassword(){let changed=false;teachers.forEach(t=>{if(t.role==="teacher"&&(t.password!==DEFAULT_TEACHER_PASSWORD||t.mustChangePassword)){t.password=DEFAULT_TEACHER_PASSWORD;t.mustChangePassword=false;changed=true}});if(changed){repo.saveTeachers(teachers);scheduleAutoSync()}}
ensureDefaultAdmin();

const today = () => {const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`};
const nowISO = () => new Date().toISOString();
const esc = v => String(v ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const pad2 = n => String(n).padStart(2,"0");
function cleanSheetValue(v){return String(v ?? "").trim().replace(/^["']|["']$/g,"")}
function normalizeDateValue(v){const s=cleanSheetValue(v);if(!s)return"";if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);const d=new Date(s);if(!Number.isNaN(d.getTime()))return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;return s}
function normalizeTimeValue(v){const s=cleanSheetValue(v);if(!s)return"";const m=s.match(/^(\d{1,2}):(\d{2})/);if(m)return `${pad2(m[1])}:${m[2]}`;const d=new Date(s);if(!Number.isNaN(d.getTime()))return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;return s}
function normalizeDemoLesson(d){return {...d,date:normalizeDateValue(d.date),arrivalTime:normalizeTimeValue(d.arrivalTime),lessonStartTime:normalizeTimeValue(d.lessonStartTime),confirmedBy:d.confirmedBy||""}}
function normalizeShiftRequest(r){return {...r,date:normalizeDateValue(r.date),startTime:normalizeTimeValue(r.startTime),endTime:normalizeTimeValue(r.endTime)}}
function normalizeStaffShift(s){return {...s,date:normalizeDateValue(s.date),startTime:normalizeTimeValue(s.startTime),endTime:normalizeTimeValue(s.endTime)}}
function normalizeManagerAbsence(a){return {...a,date:normalizeDateValue(a.date)}}
const dateLabel = d => { const normalized=normalizeDateValue(d); const x = new Date(normalized+"T00:00:00"); if(Number.isNaN(x.getTime()))return "日付エラー"; return `${x.getMonth()+1}/${x.getDate()}(${["日","月","火","水","木","金","土"][x.getDay()]})`; };
const teacherName = id => teachers.find(t=>t.teacherId===id)?.name || "未設定";
const shiftPayload = s => ({...s,teacherName:teacherName(s.teacherId),updatedAt:s.updatedAt||nowISO()});
const isAdmin = user => user?.role==="admin";
const adminId = () => teachers.find(t=>isAdmin(t))?.teacherId || "T000";
const activeTeachers = () => teachers.filter(t=>t.role==="teacher" && t.status==="在籍");
const firstValue = (...vals) => vals.find(v=>v!==undefined&&v!==null&&String(v).trim()!=="");
const demoId = d => firstValue(d.demoId,d.id,d.lessonId,d.applicationId,"");
const demoDate = d => normalizeDateValue(firstValue(d.date,d.lessonDate,d.demoDate,d.day,""));
const demoArrivalTime = d => normalizeTimeValue(firstValue(d.arrivalTime,d.arrival,d.arriveTime,d.visitTime,d.startTime,""));
const demoLessonStartTime = d => normalizeTimeValue(firstValue(d.lessonStartTime,d.lessonTime,d.demoStartTime,d.classStartTime,d.startTime,d.arrivalTime,""));
const demoGrade = d => firstValue(d.grade,d.schoolGrade,d.studentGrade,d.year,"");
const demoSubject = d => firstValue(d.subject,d.subjectName,d.course,"");
const demoStudentName = d => firstValue(d.studentName,d.student,d.name,"");
const demoText = v => esc(firstValue(v,"未設定"));
const demoMessageParts = d => ({date:dateLabel(demoDate(d)),grade:demoGrade(d),subject:demoSubject(d)});
const timeHour = t => Number((t||"0:00").split(":")[0]);
const timeMinutes = t => { const [h,m]=(t||"0:00").split(":").map(Number); return h*60+(m||0); };
const gradeOptions = ["小1","小2","小3","小4","小5","小6","中1","中2","中3","高1","高2","高3"];
const subjectOptions = ["英語","数学","国語","理科","社会","その他"];
let autoSyncTimer = null;
function scheduleAutoSync(){if(!gasUrl())return;clearTimeout(autoSyncTimer);autoSyncTimer=setTimeout(()=>sheetSync.exportToSpreadsheet().catch(e=>console.error("Auto sync failed:",e)),900)}
const saveAll = () => { repo.saveTeachers(teachers); repo.saveShiftRequests(shiftRequests); repo.saveStaffShifts(staffShifts); repo.saveDemoLessons(demoLessons); repo.saveDemoApplications(demoApplications); repo.saveManagerAbsences(managerAbsences); repo.saveNotifications(notifications); repo.saveSettings(settings); scheduleAutoSync(); };
applyCommonTeacherPassword();
function gasUrl(){return GAS_WEB_APP_URL}
async function gasPost(action,payload){
  store.write("sl_local_sync_log_v1",[{action,payload,updatedAt:nowISO()},...store.read("sl_local_sync_log_v1",[]).slice(0,49)]);
  const url = gasUrl();
  if(!url) return;
  await fetch(url,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action,payload})
  });
}
async function loadFromGas(){try{await sheetSync.importFromSpreadsheet()}catch(e){console.error("Spreadsheet import failed:",e)}}
function addNotification(targetTeacherId,type,title,message,extra={}){notifications.unshift({notificationId:"N"+Date.now()+Math.random().toString(36).slice(2,5),targetTeacherId,type,title,message,isRead:false,createdAt:nowISO(),...extra});repo.saveNotifications(notifications)}
function validPassword(p){return p.length>=8 && /[A-Za-z]/.test(p) && /\d/.test(p)}
function nextTeacherId(){const nums=teachers.filter(t=>t.role==="teacher").map(t=>Number(t.teacherId.replace("T",""))).filter(n=>!Number.isNaN(n));return "T"+String((nums.length?Math.max(...nums):0)+1).padStart(3,"0")}
function generateInitialPassword(){return DEFAULT_TEACHER_PASSWORD}
function login(){
  ensureDefaultAdmin();
  const id = document.getElementById("login-id").value.trim();
  const pw = document.getElementById("login-password").value;
  const user = teachers.find(t=>t.loginId===id && t.password===pw && (t.status==="在籍"||t.role==="admin"));
  if(!user) return alert("ログインIDまたはパスワードが正しくありません。");
  currentUser = user;
  pendingLoginToast = user.role==="teacher";
  boot();
}
function boot(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app-header").classList.remove("hidden");
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("user-badge").textContent = `${currentUser.name} / ${currentUser.teacherId}`;
  document.getElementById("app").className = isAdmin(currentUser) ? "max-w-6xl mx-auto bg-white min-h-screen shadow-xl flex flex-col relative transition-all duration-300" : "max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative transition-all duration-300";
  document.getElementById("teacher-nav").classList.toggle("hidden", isAdmin(currentUser));
  if(currentUser.role==="teacher" && currentUser.mustChangePassword){currentUser.mustChangePassword=false;repo.saveTeachers(teachers);gasPost("upsertTeacher",currentUser)}
  render();
  loadFromGas();
  if(pendingLoginToast&&currentUser.role==="teacher"){pendingLoginToast=false;setTimeout(showTeacherConfirmedToast,250)}
}
function logout(){currentUser=null;location.reload()}
function render(){if(!currentUser){document.getElementById("auth")?.classList.remove("hidden");document.getElementById("app-header")?.classList.add("hidden");document.getElementById("main")?.classList.add("hidden");return}isAdmin(currentUser) ? renderManager() : renderTeacher()}

function managerTabs(){
  const tabs=[["home","ホーム","fa-house"],["demo","体験授業","fa-person-chalkboard"],["shift","シフト管理","fa-calendar-days"],["teachers","講師一覧","fa-users"],["account","アカウント設定","fa-user-gear"]];
  return `<div class="bg-white border border-slate-200 rounded-xl p-1 shadow-sm flex gap-1 mb-4">${tabs.map(t=>`<button onclick="managerView='${t[0]}';render()" class="flex-1 py-2 rounded-lg text-xs font-bold ${managerView===t[0]?'bg-orange-600 text-white':'text-orange-800 hover:bg-orange-50'}"><i class="fa-solid ${t[2]} mr-1"></i>${t[1]}</button>`).join("")}</div>`
}
function renderManager(){const views={home:managerHome,demo:managerDemo,shift:managerShift,teachers:managerTeachers,account:accountSettings};try{document.getElementById("main").innerHTML=managerTabs()+views[managerView]()}catch(e){console.error(e);document.getElementById("main").innerHTML=managerTabs()+`<div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-sm font-bold">画面の表示中にエラーが起きました。体験授業データの一部が不完全な可能性があります。ページを再読み込みして、もう一度開いてください。</div>`}}
function actionCard(title,count,button,view,tone,extra=""){return `<button onclick="${extra}managerView='${view}';render()" class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm text-left hover:border-${tone}-300"><div class="flex justify-between items-start"><div><div class="text-[11px] text-slate-500 font-bold">${title}</div><div class="text-2xl font-black text-slate-900 mt-1">${count}<span class="text-sm ml-1">件</span></div></div><span class="bg-${tone}-50 text-${tone}-700 border border-${tone}-200 px-3 py-1 rounded-lg text-xs font-bold">${button}</span></div></button>`}
function managerHome(){
  const unassigned=demoLessons.filter(d=>!d.assignedTeacherId&&d.status!==DEMO.DONE&&d.status!==DEMO.CANCELED).length;
  const waiting=demoLessons.filter(d=>d.status===DEMO.WAITING).length;
  const unpublished=staffShifts.filter(s=>s.status===SHIFT.CONFIRMED).length;
  const newApps=demoApplications.filter(a=>a.status==="応募済み"&&!demoLessons.find(d=>demoId(d)===a.demoId)?.assignedTeacherId).length;
  return `<div class="grid grid-cols-1 lg:grid-cols-2 gap-3">${actionCard("担当未定",unassigned,"一覧へ","demo","red","managerDemoMode='list';demoFilter='unassigned';")}${actionCard("確認待ち",waiting,"一覧へ","demo","amber","managerDemoMode='list';demoFilter='waiting';")}${actionCard("未公開シフト",unpublished,"一覧へ","shift","emerald")}${actionCard("新しい応募",newApps,"一覧へ","demo","blue","managerDemoMode='list';demoFilter='all';")}</div>`
}

function managerDemo(){
  const body=managerDemoMode==="calendar"?demoCalendar():demoList();
  return `<div class="space-y-3"><div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm"><div class="flex flex-col lg:flex-row lg:justify-between lg:items-start gap-3"><div><h2 class="font-bold text-sm">体験授業</h2><p class="text-[11px] text-slate-500 mt-1">次に対応する体験授業を一覧で確認します。</p></div><div class="flex flex-wrap gap-2 justify-end"><button onclick="showDemoModal=true;render()" class="bg-orange-600 text-white px-4 py-2.5 rounded-lg text-xs font-bold shadow-sm">新規体験授業を登録</button><div class="bg-slate-100 rounded-lg p-1 flex text-[11px] font-bold"><button onclick="managerDemoMode='list';render()" class="px-3 py-1 rounded ${managerDemoMode==='list'?'bg-white shadow-sm text-orange-700':'text-slate-500'}">📋 一覧</button><button onclick="managerDemoMode='calendar';render()" class="px-3 py-1 rounded ${managerDemoMode==='calendar'?'bg-white shadow-sm text-orange-700':'text-slate-500'}">📅 カレンダー</button></div></div></div></div>${demoCompactSummary()}${body}${showDemoModal?demoModal():""}</div>`
}
function activeDemoLessons(){return demoLessons.filter(d=>d.status!==DEMO.DONE&&d.status!==DEMO.CANCELED)}
function demoSortKey(d){return `${demoDate(d)}${demoArrivalTime(d)||demoLessonStartTime(d)}`}
function demoHistoryLessons(){return demoLessons.filter(d=>d.status===DEMO.DONE).sort((a,b)=>demoSortKey(b).localeCompare(demoSortKey(a)))}
function demoFilteredLessons(){const source=demoFilter==="done"?demoHistoryLessons():activeDemoLessons();return source.filter(d=>demoFilter==="all"||demoFilter==="today"&&demoDate(d)===today()||demoStatusKey(d)===demoFilter).sort((a,b)=>demoSortKey(a).localeCompare(demoSortKey(b)))}
function demoStatusKey(d){if(!d.assignedTeacherId)return"unassigned";if(d.status===DEMO.WAITING)return"waiting";if(d.status===DEMO.CONFIRMED)return"confirmed";if(d.status===DEMO.DONE)return"done";return"other"}
function demoStatusLabel(d){if(!d.assignedTeacherId)return"担当未定";if(d.status===DEMO.WAITING)return"講師確認待ち";if(d.status===DEMO.CONFIRMED)return d.confirmedBy==="manager"?"最終決定（代理）":"最終決定";if(d.status===DEMO.DONE)return"完了";return d.status}
function demoStatusDot(d){const k=demoStatusKey(d);return k==="unassigned"?"🔴":k==="waiting"?"🟡":k==="confirmed"?"🟢":k==="done"?"⚪":"🔵"}
function demoApplicants(id){return demoApplications.filter(a=>a.demoId===id&&a.status==="応募済み")}
function demoAssignControl(d){const id=demoId(d),apps=demoApplicants(id),appIds=new Set(apps.map(a=>a.teacherId)),options=activeTeachers().map(t=>`<option value="${t.teacherId}" ${d.assignedTeacherId===t.teacherId?'selected':''}>${esc(t.name)}${appIds.has(t.teacherId)?"（応募あり）":""}</option>`).join("");if(!activeTeachers().length)return `<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-[11px] font-bold">在籍講師なし</span>`;return `<select onchange="assignDemo('${id}',this.value)" class="p-1 border rounded text-[11px] bg-white"><option value="">講師を指定</option>${options}</select>`}

function toggleWish(date){if(deadlinePassed())return alert("締切後は編集できません。");selectedDates=selectedDates.includes(date)?selectedDates.filter(d=>d!==date):[...selectedDates,date];render()}
function submitRequest(){if(deadlinePassed())return alert("提出締切を過ぎているため、登録できません。変更がある場合は、教室長にご連絡ください。");if(!selectedDates.length)return alert("提出する希望日を選択してください。");const start=document.getElementById("req-start").value,end=document.getElementById("req-end").value;if(timeMinutes(start)>=timeMinutes(end))return alert("終了時刻は開始時刻より後にしてください。");const created=[];selectedDates.forEach(date=>{const r={requestId:"R"+Date.now()+Math.random().toString(36).slice(2,4),teacherId:currentUser.teacherId,month:date.slice(0,7),date,startTime:start,endTime:end,type:"希望",status:SHIFT.SUBMITTED,createdAt:nowISO(),updatedAt:nowISO()};shiftRequests.push(r);created.push(r)});selectedDates=[];repo.saveShiftRequests(shiftRequests);created.forEach(r=>gasPost("upsertShiftRequest",r));scheduleAutoSync();alert("シフト希望を提出しました。");render()}
function requestRow(r){const locked=deadlinePassed()||r.status!==SHIFT.SUBMITTED,edit=`<div class="grid grid-cols-2 gap-2 mt-2">${timeSelect("edit-start-"+r.requestId,r.startTime)}${timeSelect("edit-end-"+r.requestId,r.endTime)}</div><div class="flex gap-2 mt-2"><button onclick="editRequest('${r.requestId}')" class="flex-1 bg-blue-50 text-blue-700 border border-blue-200 rounded py-1 font-bold">編集</button><button onclick="deleteRequest('${r.requestId}')" class="flex-1 bg-red-50 text-red-700 border border-red-200 rounded py-1 font-bold">削除</button></div>`;return `<div class="bg-white border rounded-xl p-3 text-xs shadow-sm"><div class="font-bold">${dateLabel(r.date)} ${r.startTime}〜${r.endTime}</div><div class="text-emerald-700 font-bold mt-1">${r.status}</div>${locked?"":edit}</div>`}
function editRequest(id){if(deadlinePassed())return alert("締切後は編集できません。");const r=shiftRequests.find(x=>x.requestId===id&&x.teacherId===currentUser.teacherId);if(!r||r.status!==SHIFT.SUBMITTED)return;const start=document.getElementById("edit-start-"+id).value,end=document.getElementById("edit-end-"+id).value;r.startTime=start;r.endTime=end;r.updatedAt=nowISO();repo.saveShiftRequests(shiftRequests);gasPost("upsertShiftRequest",r);scheduleAutoSync();render()}
function deleteRequest(id){if(deadlinePassed())return alert("締切後は削除できません。");shiftRequests=shiftRequests.filter(r=>!(r.requestId===id&&r.teacherId===currentUser.teacherId));repo.saveShiftRequests(shiftRequests);gasPost("deleteShiftRequest",{requestId:id});scheduleAutoSync();render()}
function teacherDemo(){const rows=demoLessons.filter(d=>!d.assignedTeacherId&&d.status!==DEMO.CANCELED&&d.status!==DEMO.DONE).map(d=>{const id=demoId(d),app=demoApplications.some(a=>a.demoId===id&&a.teacherId===currentUser.teacherId&&a.status==="応募済み");return `<div class="bg-white border rounded-xl p-3 text-xs shadow-sm"><div class="font-black">${dateLabel(demoDate(d))} ${demoText(demoGrade(d))} ${demoText(demoSubject(d))}</div><div class="text-slate-500 mt-.5">来校${demoText(demoArrivalTime(d))} / 授業${demoText(demoLessonStartTime(d))}</div><div class="mt-2 flex justify-between items-center"><span class="font-bold ${app?'text-blue-700':'text-slate-500'}">${app?"応募済み":"募集中"}</span>${app?`<button onclick="cancelDemoApply('${id}')" class="bg-red-50 text-red-700 border border-red-200 px-2 py-1 rounded text-[10px] font-bold">取消</button>`:`<button onclick="applyDemo('${id}')" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold">応募</button>`}</div></div>`}).join("");return `<div class="space-y-3"><div class="bg-white border rounded-xl p-4 shadow-sm"><h2 class="font-bold text-sm">体験授業募集</h2><p class="text-[11px] text-slate-500 mt-1">担当決定後はマイ予定に表示されます。</p></div>${rows||'<div class="text-xs text-slate-400">募集中の体験授業はありません</div>'}</div>`}
function applyDemo(id){if(demoApplications.some(a=>a.demoId===id&&a.teacherId===currentUser.teacherId&&a.status==="応募済み"))return;const app={applicationId:"A"+Date.now(),demoId:id,teacherId:currentUser.teacherId,status:"応募済み",createdAt:nowISO(),updatedAt:nowISO()};demoApplications.push(app);const d=demoLessons.find(x=>demoId(x)===id);if(d&&!d.assignedTeacherId){d.status=DEMO.APPLIED;d.updatedAt=nowISO();addNotification(adminId(),"demo_application","体験授業応募",`${currentUser.name} が ${dateLabel(demoDate(d))} ${demoGrade(d)} ${demoSubject(d)} に応募しました`,{demoId:id});gasPost("updateDemoStatus",{demoId:id,status:d.status,updatedAt:d.updatedAt})}saveAll();gasPost("upsertDemoApplication",app);render()}
function cancelDemoApply(id){const removed=demoApplications.filter(a=>a.demoId===id&&a.teacherId===currentUser.teacherId);demoApplications=demoApplications.filter(a=>!(a.demoId===id&&a.teacherId===currentUser.teacherId));const d=demoLessons.find(x=>demoId(x)===id);if(d&&!d.assignedTeacherId){d.status=demoApplications.some(a=>a.demoId===id)?DEMO.APPLIED:DEMO.OPEN;d.updatedAt=nowISO();gasPost("updateDemoStatus",{demoId:id,status:d.status,updatedAt:d.updatedAt})}saveAll();removed.forEach(a=>gasPost("deleteDemoApplication",{applicationId:a.applicationId}));render()}
function planCard(item){if(item.kind==="shift"){const s=item.data;return `<div class="bg-white border-2 border-blue-100 rounded-xl p-3 shadow-sm text-xs"><div class="flex justify-between items-start gap-2"><div class="font-black text-blue-700">🔵 【確定】スタッフ業務</div><span class="bg-blue-600 text-white rounded-full px-2 py-0.5 text-[10px] font-black">確定</span></div><div class="mt-2 grid grid-cols-[1fr_auto] gap-3 items-center"><div class="font-black text-slate-900 text-sm">${dateLabel(s.date)}</div><div class="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-blue-800 font-black text-lg leading-none">${s.startTime}〜${s.endTime}</div></div></div>`}const d=item.data,id=demoId(d),waiting=d.status===DEMO.WAITING;return `<div class="bg-white border-2 border-emerald-100 rounded-xl p-3 shadow-sm text-xs"><div class="flex justify-between items-start gap-2"><div class="font-black text-emerald-700">🟢 【確定】体験授業</div><span class="${waiting?'bg-amber-500':'bg-emerald-600'} text-white rounded-full px-2 py-0.5 text-[10px] font-black">${waiting?'要確認':'確認済'}</span></div><div class="mt-1 text-[11px] text-slate-600 font-bold truncate">${demoText(demoStudentName(d))}様 / ${demoText(demoGrade(d))}${demoText(demoSubject(d))}</div><div class="mt-2 grid grid-cols-[1fr_auto] gap-3 items-center"><div class="font-black text-slate-900 text-sm">${dateLabel(demoDate(d))}</div><div class="flex gap-1.5"><span class="bg-orange-50 border border-orange-200 rounded-lg px-2 py-1 text-orange-800 font-black text-base leading-none">${demoText(demoArrivalTime(d))}</span><span class="bg-rose-50 border border-rose-200 rounded-lg px-2 py-1 text-rose-800 font-black text-base leading-none">${demoText(demoLessonStartTime(d))}</span></div></div>${waiting?`<button onclick="confirmDemo('${id}')" class="mt-2 w-full bg-emerald-600 text-white py-2 rounded-lg text-[11px] font-black">確認しました</button>`:""}</div>`}
function teacherPlans(){const isHistory=teacherPlansMode==="history",shifts=isHistory?[]:staffShifts.filter(s=>s.teacherId===currentUser.teacherId&&s.status===SHIFT.PUBLISHED&&normalizeDateValue(s.date)>=today()),demos=demoLessons.filter(d=>d.assignedTeacherId===currentUser.teacherId&&d.status!==DEMO.CANCELED&&(isHistory?d.status===DEMO.DONE||demoDate(d)<today():d.status!==DEMO.DONE&&demoDate(d)>=today()));if(isHistory){const groups=groupByMonth(demos.sort((a,b)=>demoSortKey(b).localeCompare(demoSortKey(a))));const months=Object.keys(groups).sort().reverse();return `<div class="space-y-4"><div class="bg-white border rounded-xl p-4 shadow-sm flex justify-between items-center"><div><h2 class="font-bold text-sm">履歴</h2><p class="text-[11px] text-slate-500 mt-1">完了・過去の体験授業</p></div><button onclick="teacherPlansMode='active';render()" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-xs font-bold">マイ予定へ</button></div>${months.map(ym=>`<div class="bg-white border rounded-xl p-4 shadow-sm"><h3 class="font-black text-sm mb-3">${monthTitle(ym)}</h3><div class="space-y-2">${groups[ym].map(d=>`<div class="bg-slate-50 border rounded-lg p-3 text-xs"><b>${dateLabel(demoDate(d))} ${demoText(demoGrade(d))}${demoText(demoSubject(d))}</b><br>来校${demoText(demoArrivalTime(d))} / 授業${demoText(demoLessonStartTime(d))}<br>確認日時: ${d.confirmedAt?new Date(d.confirmedAt).toLocaleString():"-"}</div>`).join("")}</div></div>`).join("")||'<div class="bg-white border rounded-xl p-4 text-xs text-slate-400">履歴はありません</div>'}</div>`}const items=[...shifts.map(s=>({kind:"shift",sort:normalizeDateValue(s.date)+s.startTime,data:s})),...demos.map(d=>({kind:"demo",sort:demoSortKey(d),data:d}))].sort((a,b)=>a.sort.localeCompare(b.sort));return `<div class="space-y-3"><div class="bg-white border rounded-xl p-4 shadow-sm flex justify-between items-center"><div><h2 class="font-bold text-sm">マイ予定</h2><p class="text-[11px] text-slate-500 mt-1">今後の予定だけを表示します。</p></div><button onclick="teacherPlansMode='history';render()" class="bg-white text-slate-600 border border-slate-200 px-3 py-2 rounded-lg text-xs font-bold">履歴を見る</button></div><div class="space-y-2">${items.map(planCard).join("")||'<div class="bg-white border rounded-xl p-4 text-xs text-slate-400">今後の予定はありません</div>'}</div></div>`}
function confirmDemo(id){const d=demoLessons.find(x=>demoId(x)===id&&x.assignedTeacherId===currentUser.teacherId);if(!d)return;d.status=DEMO.CONFIRMED;d.confirmedAt=nowISO();d.confirmedBy="teacher";d.updatedAt=nowISO();notifications.forEach(n=>{if(n.targetTeacherId===currentUser.teacherId&&isDemoNotificationFor(n,d,id))n.isRead=true});addNotification(adminId(),"demo_confirmed","体験授業確認済み",`${currentUser.name} が ${dateLabel(demoDate(d))} ${demoGrade(d)} ${demoSubject(d)} を確認しました`,{demoId:id});saveAll();gasPost("updateDemoStatus",{demoId:id,status:d.status,confirmedAt:d.confirmedAt,confirmedBy:d.confirmedBy,updatedAt:d.updatedAt});render()}
function timeSelect(id,selected){return `<select id="${id}" class="p-2 border rounded-lg text-xs bg-white">${timeOptions.map(t=>`<option ${t===selected?"selected":""}>${t}</option>`).join("")}</select>`}
function gradeSelect(id,selected){return `<select id="${id}" class="p-2 border rounded-lg text-xs bg-white">${gradeOptions.map(g=>`<option ${g===selected?"selected":""}>${g}</option>`).join("")}</select>`}
function subjectSelect(id,selected){return `<select id="${id}" onchange="toggleSubjectOther()" class="p-2 border rounded-lg text-xs bg-white">${subjectOptions.map(s=>`<option ${s===selected?"selected":""}>${s}</option>`).join("")}</select>`}
function toggleSubjectOther(){const select=document.getElementById("demo-subject"),other=document.getElementById("demo-subject-other");if(!select||!other)return;other.classList.toggle("hidden",select.value!=="その他");if(select.value!=="その他")other.value=""}
function toggleSubjectOther(){const select=document.getElementById("demo-subject"),other=document.getElementById("demo-subject-other");if(!select||!other)return;other.classList.toggle("hidden",select.value!=="その他");if(select.value!=="その他")other.value=""}
window.addEventListener("DOMContentLoaded", async () => {
  try {
    if (typeof sheetSync !== "undefined") await sheetSync.importFromSpreadsheet();
  } catch (error) {
    console.error("Spreadsheet import failed:", error);
  }
  if (typeof render === "function") render();
});
</script>
